<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargar y mostrar Apercibimientos</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .file-input { margin-bottom: 20px; }
        .error { color: #dc3545; padding: 10px; background: #f8d7da; border-radius: 4px; display: none; margin-bottom: 20px; }
        .contenido { display: none; }
        
        /* Estilos para las filas */
        .fila-apercibimiento { background-color: #fff3cd !important; } /* Amarillo suave */
        .fila-comunicacion { background-color: #f8d7da !important; } /* Rojo suave */
        
        /* Mantener el hover de DataTables */
        .fila-apercibimiento:hover { background-color: #ffe69e !important; }
        .fila-comunicacion:hover { background-color: #f1b0b7 !important; }
        
        /* Leyenda */
        .leyenda {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
            display: flex;
            gap: 20px;
        }
        .color-muestra {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <h1>Cargar archivo CSV de Apercibimientos y Comunicaciones</h1>

    <div class="file-input">
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div id="error" class="error"></div>

    <div class="contenido" id="contenido">
        <table id="tablaApercibimientos" class="display" style="width:100%">
            <thead id="tablaHeader"></thead>
            <tbody id="tablaBody"></tbody>
        </table>
        
        <div class="leyenda">
            <div><span class="color-muestra" style="background-color: #fff3cd;"></span> Apercibimiento</div>
            <div><span class="color-muestra" style="background-color: #f8d7da;"></span> Comunicación</div>
        </div>
    </div>

    <script>
        let dataTable = null;

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const contenido = evt.target.result;
                mostrarCSV(contenido);
            };
            reader.onerror = function() {
                mostrarError('Error al leer el archivo');
            };
            reader.readAsText(file, 'UTF-8');
        });

        function mostrarCSV(csvText) {
            try {
                const lineas = csvText.split('\n').filter(linea => linea.trim());
                if (lineas.length === 0) throw new Error('Archivo vacío');

                const cabeceras = lineas[0].split(',').map(c => c.replace(/["']/g, '').trim());
                
                const datos = [];
                for (let i = 1; i < lineas.length; i++) {
                    const valores = [];
                    let campo = '';
                    let entreComillas = false;
                    
                    for (let j = 0; j < lineas[i].length; j++) {
                        const char = lineas[i][j];
                        if (char === '"') {
                            entreComillas = !entreComillas;
                        } else if (char === ',' && !entreComillas) {
                            valores.push(campo.trim());
                            campo = '';
                        } else {
                            campo += char;
                        }
                    }
                    valores.push(campo.trim());
                    
                    if (valores.length >= cabeceras.length) {
                        const fila = {};
                        cabeceras.forEach((cab, idx) => {
                            fila[cab] = valores[idx] || '';
                        });
                        datos.push(fila);
                    }
                }

                if (datos.length === 0) throw new Error('No se encontraron datos');

                mostrarTabla(cabeceras, datos);
                ocultarError();
            } catch(err) {
                mostrarError('Error al procesar CSV: ' + err.message);
            }
        }

        function esApercibimiento(fila) {
            // Buscar en todas las columnas si contiene "apercibimiento" o "apercibimento"
            for (let valor of Object.values(fila)) {
                if (valor && (valor.toLowerCase().includes('apercibimiento') || 
                              valor.toLowerCase().includes('apercibimento'))) {
                    return true;
                }
            }
            return false;
        }

        function esComunicacion(fila) {
            // Buscar en todas las columnas si contiene "comunicación" o "comunicacion"
            for (let valor of Object.values(fila)) {
                if (valor && (valor.toLowerCase().includes('comunicación') || 
                              valor.toLowerCase().includes('comunicacion'))) {
                    return true;
                }
            }
            return false;
        }

        function obtenerClaseFila(fila) {
            if (esComunicacion(fila)) return 'fila-comunicacion';
            if (esApercibimiento(fila)) return 'fila-apercibimiento';
            return '';
        }

        function mostrarTabla(cabeceras, datos) {
            // Destruir DataTable anterior si existe
            if (dataTable) {
                dataTable.destroy();
            }

            const thead = document.getElementById('tablaHeader');
            const tbody = document.getElementById('tablaBody');
            
            thead.innerHTML = '<tr>' + cabeceras.map(c => `<th>${c}</th>`).join('') + '</tr>';
            
            // Generar filas con clases según el tipo
            let filasHtml = '';
            datos.forEach(fila => {
                const clase = obtenerClaseFila(fila);
                const celdas = cabeceras.map(cab => `<td>${fila[cab] || ''}</td>`).join('');
                filasHtml += `<tr class="${clase}">${celdas}</tr>`;
            });
            tbody.innerHTML = filasHtml;

            // Inicializar DataTable
            dataTable = $('#tablaApercibimientos').DataTable({
                language: {
                    "sProcessing": "Procesando...",
                    "sLengthMenu": "Mostrar _MENU_ registros",
                    "sZeroRecords": "No se encontraron resultados",
                    "sEmptyTable": "Ningún dato disponible",
                    "sInfo": "Mostrando _START_ a _END_ de _TOTAL_ registros",
                    "sInfoEmpty": "Mostrando 0 a 0 de 0 registros",
                    "sInfoFiltered": "(filtrado de _MAX_ registros totales)",
                    "sSearch": "Buscar:",
                    "oPaginate": {
                        "sFirst": "Primero",
                        "sLast": "Último",
                        "sNext": "Siguiente",
                        "sPrevious": "Anterior"
                    }
                },
                pageLength: 25,
                order: [[0, 'asc']]
            });

            document.getElementById('contenido').style.display = 'block';
        }

        function mostrarError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            document.getElementById('contenido').style.display = 'none';
        }

        function ocultarError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
